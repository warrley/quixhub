services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
